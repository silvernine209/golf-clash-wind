<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Golf Clash Wind</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#0f5735">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">

  <meta name="twitter:image" content="https://silvernine209.github.io/golf-clash-wind/docs/screenshots/01-play-wide.png">
  <style>
    :root {
      --bg: #f4f6f5;
      --surface: #ffffff;
      --surface-2: #eef1ef;
      --text: #14201b;
      --text-dim: #4a5a52;
      --accent: #0f5735;
      --accent-soft: #d6eadf;
      --warn: #b8651e;
      --hit: #e74c3c;
      --border: #cfd8d3;
      --shadow: 0 1px 2px rgba(0,0,0,.06);
      --r: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1411;
        --surface: #182320;
        --surface-2: #243430;
        --text: #e8efeb;
        --text-dim: #9bb0a6;
        --accent: #5fcf95;
        --accent-soft: #1d3a2b;
        --warn: #ffb072;
        --hit: #ff7a6c;
        --border: #2a3b35;
        --shadow: 0 1px 2px rgba(0,0,0,.5);
      }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font: 16px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      overscroll-behavior-y: contain;
    }
    main { max-width: 1100px; margin: 0 auto; padding: 12px 12px 32px; }

    /* Narrow (< 600): everything stacks. play-input-col, play-tables-col
       and cb-pair are flex columns that hold their children inline. */
    .play-grid { display: flex; flex-direction: column; gap: 10px; }
    .play-input-col, .play-tables-col, .cb-pair {
      display: flex; flex-direction: column; gap: 10px; min-width: 0;
    }

    /* Medium (600–899): wind on the left top, compass + vertical ball
       power side-by-side on the right top (same idea as wide). Tables
       full width below. play-input-col / play-tables-col go invisible
       via display:contents so they don't participate in the grid;
       cb-pair stays as a flex container that occupies the "cb" area. */
    @media (min-width: 600px) and (max-width: 899px) {
      .play-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "wind cb"
          "wind cb"
          "t1   t1"
          "t2   t2";
        gap: 10px;
        align-items: start;
      }
      .play-input-col, .play-tables-col { display: contents; }
      .cb-pair {
        display: flex; flex-direction: row; gap: 10px;
        grid-area: cb; align-items: stretch;
      }
      .cb-pair > .compass-wrap { flex: 1; min-width: 0; }
      .cb-pair > .bp-card { width: 88px; flex: 0 0 88px; padding: 10px 8px; }
      .cb-pair .ball-power { flex-direction: column; gap: 4px; align-items: stretch; }
      .cb-pair .bp-header { flex-direction: column; align-items: flex-start;
        gap: 0; margin-bottom: 6px; }
      .cb-pair .bp-header .caption { display: none; }
      .cb-pair .ball-power .chip { width: 100%; padding: 4px 6px; min-width: 0; }
      .card[data-area="wind"] { grid-area: wind; }
      .card[data-area="t1"]   { grid-area: t1; }
      .card[data-area="t2"]   { grid-area: t2; }
    }

    /* Wide (>= 900): two independent flex columns so tables auto-size
       (no forced row-spanning, no empty gap between Table 1 and Table 2).
       Compass + Ball Power sit side-by-side via cb-pair flex-row, with
       Ball Power as a narrow vertical column of chips. */
    @media (min-width: 900px) {
      main { padding: 12px 16px 32px; }
      .play-grid { flex-direction: row; gap: 14px; align-items: flex-start; }
      .play-input-col { flex: 0 0 380px; gap: 14px; }
      .play-tables-col { flex: 1; min-width: 0; gap: 14px; }
      .cb-pair { flex-direction: row; gap: 10px; align-items: stretch; }
      .cb-pair > .compass-wrap { flex: 1; min-width: 0; }
      .cb-pair > .bp-card { width: 92px; flex: 0 0 92px; padding: 10px 8px; }
      .cb-pair .ball-power { flex-direction: column; gap: 4px; align-items: stretch; }
      .cb-pair .bp-header { flex-direction: column; align-items: flex-start;
        gap: 0; margin-bottom: 6px; }
      .cb-pair .bp-header .caption { display: none; }
      .cb-pair .ball-power .chip { min-width: 0; padding: 4px 6px; width: 100%; }
      .cb-pair .ball-power .chip .num { font-size: 13px; }
      .cb-pair .ball-power .chip .sub { font-size: 9px; }
    }
    h1, h2, h3 { margin: 0; }
    h2 { font-size: 18px; }
    h3 { font-size: 14px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
    button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
    input, select { font: inherit; color: inherit; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--shadow); padding: 12px; }
    .row { display: flex; align-items: center; gap: 8px; }
    .row.gap { gap: 12px; }
    .row.wrap { flex-wrap: wrap; }
    .grow { flex: 1; }
    .mono { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    .dim { color: var(--text-dim); }
    .small { font-size: 13px; }
    .tiny { font-size: 11px; }
    .pill { display: inline-block; padding: 3px 8px; border-radius: 999px; background: var(--surface-2); font-size: 12px; color: var(--text-dim); }
    .pill.on { background: var(--accent); color: white; }

    /* Top bar */
    header.bar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 4px; position: sticky; top: 0; background: var(--bg); z-index: 5;
    }
    header.bar .title { font-weight: 700; font-size: 17px; }
    header.bar select {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px; max-width: 220px;
    }
    header.bar .icon-btn {
      width: 40px; height: 40px; border-radius: 10px; background: var(--surface);
      border: 1px solid var(--border); font-size: 18px;
    }

    /* Wind input section */
    .wind-card { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .mph-box {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 4px 0 0;
    }
    .mph-value {
      font-size: 52px; font-weight: 700; line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .mph-unit { font-size: 17px; color: var(--text-dim); }
    .clear-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-left: 4px;
    }
    .clear-btn:active { background: var(--accent-soft); }
    .dir-mult { font-size: 12px; color: var(--text-dim); text-align: center; }

    .numpad { display: grid; grid-template-columns: repeat(3, minmax(0, 84px));
      gap: 6px; justify-content: center; }
    .numpad button {
      background: var(--surface-2); border-radius: 10px;
      height: 44px; font-size: 19px; font-weight: 600;
      transition: transform 80ms ease, background 120ms ease;
    }
    .numpad button:active { transform: scale(0.95); background: var(--accent-soft); }
    .numpad .clr { color: var(--warn); font-size: 15px; }

    /* Compass — tight padding so the dial isn't floating in empty space */
    .compass-wrap { display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2px; padding: 6px 6px 8px; }
    .compass {
      width: 170px; height: 170px; max-width: 70vw; max-height: 70vw;
      display: block;
    }
    @media (min-width: 600px) { .compass { width: 180px; height: 180px; } }
    @media (min-width: 900px) { .compass { width: 200px; height: 200px; } }
    .compass-hint { font-size: 10px; color: var(--text-dim); text-align: center;
      line-height: 1.25; margin-top: 2px; }
    .compass-dir { font-weight: 600; font-size: 13px; margin-top: 2px; }
    .arrow-btn { fill: var(--text-dim); cursor: pointer; transition: fill 100ms; }
    .arrow-btn:hover { fill: var(--text); }
    /* Cardinal arrows (N/E/S/W) are red for quick visual anchoring */
    .arrow-btn.cardinal { fill: var(--hit); }
    .arrow-btn.cardinal:hover { fill: var(--hit); filter: brightness(1.15); }
    /* Selected wins regardless — declared last so its specificity ties resolve to accent */
    .arrow-btn.on, .arrow-btn.cardinal.on { fill: var(--accent); }
    .compass .face { fill: var(--surface-2); stroke: var(--border); stroke-width: 1; }
    .compass .center-btn { fill: var(--surface); stroke: var(--border); stroke-width: 1; cursor: pointer; }
    .compass .center-label { fill: var(--text-dim); font-size: 10px; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
    .compass .cardinal-label { fill: var(--hit); font-size: 11px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }

    /* Ball power chips — compact, caption shares the header row */
    .bp-header { display: flex; align-items: baseline; gap: 8px;
      flex-wrap: wrap; margin-bottom: 6px; }
    .bp-header h3 { margin: 0; }
    .bp-header .caption { font-size: 11px; color: var(--text-dim);
      flex: 1; min-width: 0; }
    .ball-power { display: flex; gap: 4px; align-items: stretch; flex-wrap: wrap; }
    .ball-power .chip {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 3px 8px; border-radius: 8px; background: var(--surface-2);
      border: 1px solid var(--border); min-width: 38px; line-height: 1.05;
    }
    .ball-power .chip .num { font-weight: 700; font-size: 13px; }
    .ball-power .chip .sub { font-size: 9px; color: var(--text-dim); }
    .ball-power .chip.on { background: var(--accent); color: white; border-color: var(--accent); }
    .ball-power .chip.on .sub { color: rgba(255,255,255,0.85); }

    /* Tables — at narrow widths let columns size to content (auto layout)
       so club names don't wrap into 4 lines. At ≥600px lock numerics to
       50px so the club column absorbs the empty whitespace. */
    table.t1 { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
    table.t1 th, table.t1 td { padding: 8px 4px; text-align: right; border-bottom: 1px solid var(--border); font-size: 14px; white-space: nowrap; }
    table.t1 th:first-child, table.t1 td:first-child { text-align: left; padding-left: 2px; padding-right: 8px; white-space: normal; }
    @media (min-width: 600px) {
      table.t1 { table-layout: fixed; }
      table.t1 th:not(:first-child), table.t1 td:not(:first-child) { width: 50px; }
    }
    table.t1 th { color: var(--text-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
    table.t1 tr.in-range td { background: var(--accent-soft); }
    table.t1 .ring-cell { font-weight: 600; font-size: 15px; }
    table.t1 .ring-cell.min { color: var(--text-dim); }
    table.t1 .ring-cell.mid { color: var(--text); }
    table.t1 .ring-cell.max { color: var(--accent); }

    /* Table 1 header: title left, Shot distance right (same row) */
    .t1-head { display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
    .t1-head h3 { margin: 0; }
    .pin { display: flex; align-items: center; gap: 4px; margin: 0; }
    .pin input {
      width: 70px; padding: 5px 8px; border-radius: 6px;
      background: var(--surface-2); border: 1px solid var(--border);
      font-size: 14px; -webkit-appearance: none;
    }

    /* Chip slider rows — narrow stacks (name | pct | live on top, slider below),
       wider inline (name | slider | pct | live one row) for much less vertical space. */
    .chip-row {
      display: grid;
      grid-template-areas:
        "name pct live"
        "slider slider slider";
      grid-template-columns: 1fr auto auto;
      gap: 2px 10px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .chip-row:last-child { border-bottom: 0; }
    .chip-row .name { grid-area: name; font-weight: 600; font-size: 14px; min-width: 0; }
    .chip-row .pct { grid-area: pct; min-width: 36px; text-align: right;
      font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
    .chip-row .live { grid-area: live; min-width: 46px; text-align: right;
      font-size: 22px; font-weight: 700; color: var(--accent);
      font-variant-numeric: tabular-nums; }
    .chip-row input[type=range] {
      grid-area: slider; width: 100%; height: 32px;
      -webkit-appearance: none; appearance: none;
      background: transparent; touch-action: pan-y;
    }
    .chip-row input[type=range]::-webkit-slider-runnable-track {
      height: 8px; background: var(--surface-2); border-radius: 4px;
    }
    .chip-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); margin-top: -10px; border: 2px solid white;
      box-shadow: 0 2px 5px rgba(0,0,0,.25);
    }
    .chip-row input[type=range]::-moz-range-track {
      height: 8px; background: var(--surface-2); border-radius: 4px;
    }
    .chip-row input[type=range]::-moz-range-thumb {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); border: 2px solid white;
      box-shadow: 0 2px 5px rgba(0,0,0,.25);
    }
    .chip-row input[type=range]:focus { outline: none; }
    @media (min-width: 520px) {
      .chip-row {
        grid-template-areas: "name slider pct live";
        grid-template-columns: minmax(160px, 1.6fr) minmax(120px, 1fr) 40px 50px;
        gap: 12px;
        padding: 4px 0;
      }
    }

    /* Recommendation card under Table 1 */
    #pin-hint { margin-top: 8px; }
    .rec-line {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      background: var(--accent-soft);
      border: 1px solid var(--accent);
    }
    .rec-arrow { color: var(--accent); font-weight: 700; font-size: 18px; line-height: 1.2; }
    .rec-body { flex: 1; min-width: 0; }
    .rec-club { font-size: 14px; }
    .rec-rings { margin-top: 4px; display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .rec-num { font-size: 28px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
    .rec-unit { color: var(--text-dim); font-size: 14px; }

    /* Bags page */
    .bag-list { display: flex; flex-direction: column; gap: 10px; }
    .bag-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: 12px; box-shadow: var(--shadow);
    }
    .bag-card.active { border-color: var(--accent); }
    .bag-card .name-line { display: flex; align-items: center; gap: 8px; font-weight: 600; }
    .bag-card .actions { display: flex; gap: 8px; margin-top: 8px; }
    .bag-card button {
      padding: 6px 10px; border-radius: 8px; background: var(--surface-2);
      border: 1px solid var(--border); font-size: 13px;
    }
    .bag-card button.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .bag-card button.danger { color: var(--hit); }

    .edit-bag h2 { margin-bottom: 8px; }
    .slot {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: 10px 12px; margin-bottom: 8px;
    }
    .slot .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }
    .slot .grid {
      display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 6px; align-items: end;
    }
    .slot input, .slot select {
      width: 100%; padding: 8px; border-radius: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      font-size: 14px; -webkit-appearance: none;
    }
    .slot .hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
    .slot .custom-name { margin-top: 6px; width: 100%; padding: 8px; border-radius: 8px;
      background: var(--surface-2); border: 1px solid var(--border); font-size: 14px; }

    /* Club images — circular icon next to club name */
    .club-img-sm {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--surface-2); object-fit: cover;
      flex: 0 0 auto; vertical-align: middle;
      border: 1px solid var(--border);
    }
    .club-img-tiny { width: 18px; height: 18px; border-radius: 50%; background: var(--surface-2);
      object-fit: cover; flex: 0 0 auto; border: 1px solid var(--border); }
    .club-img-empty { display: inline-block; }
    .club-cell { display: flex; align-items: center; gap: 8px; }

    /* Bag list club strip */
    .bag-club-strip { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .bag-club-strip img { width: 22px; height: 22px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border); object-fit: cover; }
    .bag-club-strip .miss { width: 22px; height: 22px; border-radius: 50%;
      background: var(--surface-2); border: 1px dashed var(--border); display: inline-block; }

    /* Custom dropdown for bag edit (so we can show club images per option) */
    .cs { position: relative; }
    .cs-trigger {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 6px 10px; min-height: 42px; border-radius: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      font: inherit; color: inherit; text-align: left;
    }
    .cs-trigger:active { background: var(--accent-soft); }
    .cs-icon {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface); object-fit: cover;
      flex: 0 0 auto; border: 1px solid var(--border);
    }
    .cs-icon-empty {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface); border: 1px dashed var(--border);
      flex: 0 0 auto; display: inline-block;
    }
    .cs-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; font-size: 14px; }
    .cs-arrow { color: var(--text-dim); font-size: 11px; flex: 0 0 auto; }
    .cs-menu {
      position: absolute; left: 0; right: 0; top: calc(100% + 4px);
      z-index: 50; max-height: 320px; overflow-y: auto;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: 0 8px 28px rgba(0,0,0,0.25);
      padding: 4px;
    }
    .cs-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 6px; cursor: pointer;
      font-size: 14px;
    }
    .cs-item:hover { background: var(--accent-soft); }
    .cs-item.selected { background: var(--accent); color: white; }
    .cs-item.selected .cs-icon, .cs-item.selected .cs-icon-empty { border-color: rgba(255,255,255,0.4); }
    .cs-placeholder { color: var(--text-dim); font-style: italic; }
    .cs-item.selected .cs-placeholder { color: rgba(255,255,255,0.85); }

    .fab {
      position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 14px);
      transform: translateX(-50%);
      background: var(--accent); color: white; padding: 12px 22px;
      border-radius: 999px; font-size: 16px; font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,.2); z-index: 10;
    }
    .toolbar { display: flex; gap: 8px; align-items: center; margin: 10px 0; }
    .toolbar button { padding: 8px 12px; border-radius: 8px; background: var(--surface-2); border: 1px solid var(--border); font-size: 14px; }
    .toolbar button.primary { background: var(--accent); color: white; border-color: var(--accent); }

    [hidden] { display: none !important; }

    .footer { color: var(--text-dim); font-size: 12px; text-align: center; margin-top: 24px; }
    .footer a { color: inherit; }
  </style>
</head>
<body>
  <main>
    <!-- ============================= PLAY VIEW ============================= -->
    <section id="view-play">
      <header class="bar">
        <select id="bag-selector" aria-label="Active bag"></select>
        <button class="icon-btn" id="open-bags" title="Manage bags">⚙</button>
      </header>

      <div class="play-grid">
        <div class="play-input-col">
          <div class="card wind-card" data-area="wind">
            <div class="mph-box">
              <span class="mph-value mono" id="mph-value">0</span>
              <span class="mph-unit">MPH</span>
              <button id="clear-mph" class="clear-btn" title="Clear MPH" aria-label="Clear MPH">✕</button>
            </div>
            <div class="dir-mult">direction × <span id="dir-mult" class="mono">1.00</span> · <span id="dir-name">side</span></div>
            <div class="numpad" id="numpad">
              <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
              <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
              <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
              <button data-k=".">.</button><button data-k="0">0</button><button data-k="bk">⌫</button>
            </div>
          </div>

          <div class="cb-pair">
            <div class="card compass-wrap" data-area="compass">
              <svg class="compass" id="compass" viewBox="-100 -100 200 200"></svg>
              <div class="compass-dir small dim" id="compass-dir">side wind</div>
              <div class="compass-hint">tap = wind direction · center = side</div>
            </div>

            <div class="card bp-card" data-area="ballpower">
              <div class="bp-header">
                <h3>Ball power</h3>
                <span class="caption">Each level adds % carry · scales every ring</span>
              </div>
              <div class="ball-power" id="ball-power">
                <button class="chip" data-bp="0"><span class="num">0</span><span class="sub">none</span></button>
                <button class="chip" data-bp="1"><span class="num">1</span><span class="sub">+3%</span></button>
                <button class="chip" data-bp="2"><span class="num">2</span><span class="sub">+5%</span></button>
                <button class="chip" data-bp="3"><span class="num">3</span><span class="sub">+7%</span></button>
                <button class="chip" data-bp="4"><span class="num">4</span><span class="sub">+10%</span></button>
                <button class="chip" data-bp="5"><span class="num">5</span><span class="sub">+13%</span></button>
              </div>
            </div>
          </div>
        </div>

        <div class="play-tables-col">
          <div class="card" data-area="t1">
          <div class="t1-head">
            <h3>Table 1 — Normal clubs · rings to pull</h3>
            <div class="pin">
              <label class="tiny dim" for="pin-yd">Shot distance</label>
              <input type="number" inputmode="numeric" id="pin-yd" placeholder="—" min="0" max="300">
              <span class="tiny dim">yd</span>
            </div>
          </div>
          <table class="t1">
            <thead>
              <tr><th>Club</th><th>Acc</th><th>Pwr</th><th>MIN</th><th>MID</th><th>MAX</th></tr>
            </thead>
            <tbody id="t1-body"></tbody>
          </table>
          <div class="tiny dim" id="pin-hint" style="margin-top: 6px;"></div>
        </div>

          <div class="card" data-area="t2">
            <h3>Table 2 — Chip sliders · rings to pull</h3>
            <div id="chip-rows"></div>
          </div>
        </div>
      </div>

      <div class="footer">
        Formula: <a href="https://github.com/golf-clash-notebook/golf-clash-notebook.github.io/blob/dev/modules/site/src/main/scala/golfclash/notebook/wind.scala" target="_blank" rel="noopener">GCN wind.scala</a>
      </div>
    </section>

    <!-- ============================= BAGS VIEW ============================= -->
    <section id="view-bags" hidden>
      <header class="bar">
        <button class="icon-btn" id="back-from-bags" title="Back">←</button>
        <div class="title grow">Bags</div>
        <button class="icon-btn" id="new-bag" title="New bag">+</button>
      </header>
      <div id="bag-list" class="bag-list"></div>
    </section>

    <!-- ============================= EDIT VIEW ============================= -->
    <section id="view-edit" hidden>
      <header class="bar">
        <button class="icon-btn" id="back-from-edit" title="Back">←</button>
        <div class="title grow" id="edit-title">Edit bag</div>
        <button class="icon-btn danger" id="delete-bag" title="Delete">🗑</button>
      </header>
      <div class="card">
        <h3>Bag name</h3>
        <input id="edit-name" type="text" style="width:100%;padding:10px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border);font-size:16px;">
        <h3 style="margin-top:14px;">Ball power</h3>
        <div class="ball-power" id="edit-ball-power">
          <button class="chip" data-bp="0">0</button>
          <button class="chip" data-bp="1">1</button>
          <button class="chip" data-bp="2">2</button>
          <button class="chip" data-bp="3">3</button>
          <button class="chip" data-bp="4">4</button>
          <button class="chip" data-bp="5">5</button>
        </div>
      </div>
      <div id="edit-slots"></div>
      <div class="toolbar" style="justify-content: flex-end;">
        <button id="save-bag" class="primary">Save</button>
      </div>
    </section>
  </main>

  <script src="clubs.js"></script>
  <script>
  (function () {
    "use strict";

    // ============================ Constants =================================
    const CATEGORY_MAX = { Drivers:240, Woods:180, LongIrons:135, ShortIrons:90,
                           Wedges:45, RoughIrons:135, SandWedges:120 };
    const CATEGORY_MULT = { RoughIrons:1.45, SandWedges:1.15 };
    const BALL_COEF = [1.00, 1.03, 1.05, 1.07, 1.10, 1.13];
    const NORMAL = ["Drivers","Woods","LongIrons","ShortIrons"];
    const SLIDER = ["Wedges","RoughIrons","SandWedges"];
    const ALL_CATS = NORMAL.concat(SLIDER);
    const SHORTER = { Drivers:"Woods", Woods:"LongIrons", LongIrons:"ShortIrons", ShortIrons:"Wedges" };
    const DISPLAY = {
      Drivers:"Driver", Woods:"Wood", LongIrons:"Long Iron", ShortIrons:"Short Iron",
      Wedges:"Wedge", RoughIrons:"Rough Iron", SandWedges:"Sand Wedge"
    };

    // Club names must match the catalog keys in window.CLUBS so they
    // resolve to the right images and stat lookups. (GCN data uses
    // "The Quarterback", "Nirvana" without "The", etc.)
    const SEED_BAG = {
      id: "bag-default",
      name: "My Bag",
      ballPower: 0,
      slots: {
        Drivers:    { name:"The Quarterback", level:8, power:231, accuracy:100 },
        Woods:      { name:"The Sniper",      level:7, power:166, accuracy:100 },
        LongIrons:  { name:"The Grizzly",     level:5, power:122, accuracy:60  },
        ShortIrons: { name:"The Hornet",      level:4, power:84,  accuracy:91  },
        Wedges:     { name:"The Endbringer",  level:3, power:41,  accuracy:79  },
        RoughIrons: { name:"Nirvana",         level:4, power:123, accuracy:74  },
        SandWedges: { name:"The Malibu",      level:6, power:101, accuracy:96  },
      }
    };

    // ============================== Storage ================================
    const LS = {
      get(key, fallback) {
        try { const v = localStorage.getItem(key); return v == null ? fallback : JSON.parse(v); }
        catch { return fallback; }
      },
      set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
    };

    function loadBags() {
      let bags = LS.get("gc.bags", null);
      if (!bags || !bags.length) {
        bags = [structuredClone(SEED_BAG)];
        LS.set("gc.bags", bags);
        LS.set("gc.activeBagId", bags[0].id);
      }
      // Migrate older saves: tolerate names stored without/with "The "
      // prefix that don't match the catalog exactly.
      migrateBagNames(bags);
      return bags;
    }

    // For each slot, if the name doesn't match a catalog key, try the
    // "The "-prefixed / -stripped variant and rewrite to the canonical
    // form so icons and stat lookups work.
    function migrateBagNames(bags) {
      let changed = false;
      for (const bag of bags || []) {
        for (const cat of ALL_CATS) {
          const slot = bag.slots?.[cat];
          if (!slot?.name) continue;
          const cat2 = cat;
          const catalog = window.CLUBS?.[cat2];
          if (!catalog || catalog[slot.name]) continue;
          if (catalog["The " + slot.name]) { slot.name = "The " + slot.name; changed = true; continue; }
          const stripped = slot.name.replace(/^The\s+/i, "");
          if (catalog[stripped]) { slot.name = stripped; changed = true; continue; }
        }
      }
      if (changed) saveBags(bags);
    }
    function saveBags(bags) { LS.set("gc.bags", bags); }
    function setActiveId(id) { LS.set("gc.activeBagId", id); state.activeId = id; }
    function activeBag() { return state.bags.find(b => b.id === state.activeId) || state.bags[0]; }

    function loadInputs() {
      return LS.get("gc.lastInputs", {
        mph: "0", dir: 90, pinYd: "",
        sliders: { Wedges:100, RoughIrons:100, SandWedges:100 }
      });
    }
    function saveInputs() { LS.set("gc.lastInputs", state.inputs); }

    // ============================== Formula ================================
    function ringsPerMph(category, power, accuracy, actualCarry, clubName, level, ballPower) {
      const base = 3 - accuracy / 50;
      const catMult = CATEGORY_MULT[category] || 1.0;
      const corr = (/b52|grizzly/i.test(clubName || "") && level >= 5) ? 0.9 : 1.0;
      return (actualCarry * BALL_COEF[ballPower]) /
             (CATEGORY_MAX[category] * base * catMult * corr);
    }
    function directionFactor(deg) {
      return 0.6 + 0.4 * Math.abs(Math.sin(deg * Math.PI / 180));
    }
    function compassName(deg) {
      const names = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
      const i = Math.round(((deg % 360) + 360) % 360 / 22.5) % 16;
      return names[i];
    }
    function dirCategory(deg) {
      const a = Math.abs(((deg + 180) % 360) - 180);
      const lateral = Math.abs(Math.sin(deg * Math.PI / 180));
      if (lateral < 0.2) return a < 90 ? "headwind" : "tailwind";
      if (lateral > 0.8) return "side wind";
      return "quartering";
    }

    // ============================== State =================================
    const _bagsInit = loadBags();
    const state = {
      bags: _bagsInit,
      activeId: LS.get("gc.activeBagId", _bagsInit[0]?.id),
      inputs: loadInputs(),
      view: "play",
      editingId: null,
    };

    // ============================== Routing ================================
    function route() {
      const h = location.hash.replace(/^#/, "");
      let view = "play";
      let editId = null;
      if (h === "bags") view = "bags";
      else if (h.startsWith("edit/")) { view = "edit"; editId = h.slice(5); }
      state.view = view;
      state.editingId = editId;
      $("#view-play").hidden = view !== "play";
      $("#view-bags").hidden = view !== "bags";
      $("#view-edit").hidden = view !== "edit";
      if (view === "play") {
        renderPlay();
        requestWakeLock();
      } else {
        releaseWakeLock();
        if (view === "bags") renderBagList();
        if (view === "edit") renderEdit();
      }
      window.scrollTo(0, 0);
    }

    // ============================== Helpers ================================
    function $(sel, root = document) { return root.querySelector(sel); }
    function $$(sel, root = document) { return Array.from(root.querySelectorAll(sel)); }
    function fmt(x) { return (Math.round(x * 10) / 10).toFixed(1); }
    function uid() { return "bag-" + Math.random().toString(36).slice(2, 9); }
    function parseNum(v) { const n = parseFloat(v); return isFinite(n) ? n : 0; }

    // Compute icon URL using GCN's naming convention: strip leading "The "
    // and remove non-alphanumerics. Returns "" for unknown / custom names.
    function clubImg(name) {
      if (!name || name === "__custom__") return "";
      const key = String(name).replace(/^The\s+/i, "").replace(/[^A-Za-z0-9]/g, "");
      return key ? `icons/clubs/${key}.png` : "";
    }
    function clubImgTag(name, cls = "club-img-sm") {
      const src = clubImg(name);
      if (!src) return `<span class="${cls} club-img-empty"></span>`;
      return `<img class="${cls}" src="${src}" alt="" loading="lazy"
        onerror="this.outerHTML='&lt;span class=&quot;${cls} club-img-empty&quot;&gt;&lt;/span&gt;'">`;
    }

    // ============================ Renderers ================================
    function renderPlay() {
      const bag = activeBag();
      // bag selector
      const sel = $("#bag-selector");
      sel.innerHTML = state.bags.map(b =>
        `<option value="${b.id}" ${b.id === bag.id ? "selected" : ""}>${escapeHtml(b.name)}</option>`
      ).join("");

      // ball power chips
      $$("#ball-power .chip").forEach(c => c.classList.toggle("on", +c.dataset.bp === bag.ballPower));

      // mph display
      $("#mph-value").textContent = state.inputs.mph || "0";
      $("#dir-mult").textContent = directionFactor(state.inputs.dir).toFixed(2);
      $("#dir-name").textContent = dirCategory(state.inputs.dir);
      $("#compass-dir").textContent = compassName(state.inputs.dir) + " · " + dirCategory(state.inputs.dir);
      $("#pin-yd").value = state.inputs.pinYd || "";

      renderCompass();
      renderTable1();
      renderChipRows();
    }

    function renderCompass() {
      const svg = $("#compass");
      const inputs = state.inputs;
      let html = `<circle class="face" cx="0" cy="0" r="92"/>`;
      // cardinal labels (N/E/S/W) in red
      const cards = [["N",0,-82],["E",82,0],["S",0,82],["W",-82,0]];
      for (const [t,x,y] of cards) html += `<text class="cardinal-label" x="${x}" y="${y}">${t}</text>`;
      // 16 arrows; the 4 cardinals get the .cardinal class so they're red
      for (let i = 0; i < 16; i++) {
        const deg = i * 22.5;
        const rad = deg * Math.PI / 180;
        const tipR = 46;
        const tx = Math.sin(rad) * tipR, ty = -Math.cos(rad) * tipR;
        const baseR = 70;
        const w = 8;
        const perpX = Math.cos(rad) * w, perpY = Math.sin(rad) * w;
        const b1x = Math.sin(rad) * baseR + perpX, b1y = -Math.cos(rad) * baseR + perpY;
        const b2x = Math.sin(rad) * baseR - perpX, b2y = -Math.cos(rad) * baseR - perpY;
        const isOn = Math.abs(((inputs.dir - deg + 540) % 360) - 180) < 11.25;
        const isCardinal = (deg % 90) === 0;
        html += `<g class="arrow-btn ${isOn ? "on" : ""} ${isCardinal ? "cardinal" : ""}" data-deg="${deg}">`;
        // big invisible hit box (~50px tap target)
        const hx = Math.sin(rad) * 75, hy = -Math.cos(rad) * 75;
        html += `<circle cx="${hx}" cy="${hy}" r="22" fill="transparent"/>`;
        html += `<polygon points="${tx},${ty} ${b1x},${b1y} ${b2x},${b2y}"/>`;
        html += `</g>`;
      }
      // center recenter button — tap to reset to side wind (90°)
      html += `<circle class="center-btn" cx="0" cy="0" r="22"/>`;
      html += `<text class="center-label" x="0" y="0">${state.inputs.dir.toFixed(0)}°</text>`;
      svg.innerHTML = html;
    }

    // Build the "→ at this exact distance, use Club X at Y% slider = Z rings"
    // recommendation. Returns { html, matchedCat } so renderTable1 can also
    // highlight the matched row and show its exact-rings column.
    function pinRecommendation(pin, bag) {
      if (!pin) return { html: "", matchedCat: null, exactRings: null };
      const mph = parseNum(state.inputs.mph);
      const dirF = directionFactor(state.inputs.dir);

      // Normal clubs: iterate shortest-first, so an exact boundary distance
      // (e.g. 166yd = Wood max) picks the SHORTER club (Wood at 100% slider)
      // rather than the next longer club at minimum-needed slider.
      const NORMAL_SHORT_FIRST = NORMAL.slice().reverse(); // ShortIron, LongIron, Wood, Driver
      for (let i = 0; i < NORMAL_SHORT_FIRST.length; i++) {
        const cat = NORMAL_SHORT_FIRST[i];
        const s = bag.slots[cat];
        const sh = bag.slots[SHORTER[cat]];
        const minC = sh.power, maxC = s.power;
        // shortest club uses inclusive lower bound; others use exclusive lower
        // (so the boundary belongs to the previous, shorter club).
        const lowerOk = i === 0 ? (pin >= minC) : (pin > minC);
        if (lowerOk && pin <= maxC) {
          const sliderPct = (pin / maxC) * 100;
          const rPerMph = ringsPerMph(cat, s.power, s.accuracy, pin, s.name, s.level, bag.ballPower);
          const rings = rPerMph * mph * dirF;
          const html = `
            <div class="rec-line">
              <span class="rec-arrow">→</span>
              <div class="rec-body">
                <div class="rec-club"><strong>${DISPLAY[cat]} — ${escapeHtml(s.name)} ${s.level}</strong> · ${sliderPct.toFixed(0)}% slider</div>
                <div class="rec-rings"><span class="rec-num mono">${fmt(rings)}</span> <span class="rec-unit">rings to pull</span> <span class="tiny dim">(${mph || 0} MPH × ${rPerMph.toFixed(2)} × ${dirF.toFixed(2)} dir)</span></div>
              </div>
            </div>`;
          return { html, matchedCat: cat, exactRings: rings };
        }
      }
      // Chip range
      const wedgePower = bag.slots.Wedges.power;
      if (pin <= wedgePower) {
        const s = bag.slots.Wedges;
        const sliderPct = (pin / wedgePower) * 100;
        const rPerMph = ringsPerMph('Wedges', s.power, s.accuracy, pin, s.name, s.level, bag.ballPower);
        const rings = rPerMph * mph * dirF;
        const html = `
          <div class="rec-line">
            <span class="rec-arrow">→</span>
            <div class="rec-body">
              <div class="rec-club"><strong>Wedge chip — ${escapeHtml(s.name)} ${s.level}</strong> · ${sliderPct.toFixed(0)}% slider</div>
              <div class="rec-rings"><span class="rec-num mono">${fmt(rings)}</span> <span class="rec-unit">rings to pull</span> <span class="tiny dim">(use Rough/Sand instead if on those lies)</span></div>
            </div>
          </div>`;
        return { html, matchedCat: 'Wedges', exactRings: rings };
      }
      return {
        html: `<div class="rec-line"><span class="rec-arrow">!</span><div class="rec-body"><div class="rec-club">${pin}yd is beyond your Driver max (${bag.slots.Drivers.power}yd)</div></div></div>`,
        matchedCat: null, exactRings: null
      };
    }

    function renderTable1() {
      const bag = activeBag();
      const mph = parseNum(state.inputs.mph);
      const dirF = directionFactor(state.inputs.dir);
      const pin = parseNum(state.inputs.pinYd);
      const rec = pinRecommendation(pin, bag);
      const tbody = $("#t1-body");
      let rows = "";
      for (const cat of NORMAL) {
        const s = bag.slots[cat];
        const sh = bag.slots[SHORTER[cat]];
        const minC = sh.power, maxC = s.power, midC = (minC + maxC) / 2;
        const args = (carry) => [cat, s.power, s.accuracy, carry, s.name, s.level, bag.ballPower];
        const rMin = ringsPerMph(...args(minC)) * mph * dirF;
        const rMid = ringsPerMph(...args(midC)) * mph * dirF;
        const rMax = ringsPerMph(...args(maxC)) * mph * dirF;
        const inRange = rec.matchedCat === cat;
        rows += `
          <tr class="${inRange ? "in-range" : ""}">
            <td><div class="club-cell">${clubImgTag(s.name)}<span>${DISPLAY[cat]} — ${escapeHtml(s.name)} ${s.level}</span></div></td>
            <td class="dim mono">${s.accuracy}</td>
            <td class="dim mono">${s.power}</td>
            <td class="ring-cell min mono">${fmt(rMin)}</td>
            <td class="ring-cell mid mono">${fmt(rMid)}</td>
            <td class="ring-cell max mono">${fmt(rMax)}</td>
          </tr>`;
      }
      tbody.innerHTML = rows;
      $("#pin-hint").innerHTML = rec.html;
    }

    // Full rebuild — called only when bag or slot list changes.
    function renderChipRows() {
      const bag = activeBag();
      const wrap = $("#chip-rows");
      let html = "";
      for (const cat of SLIDER) {
        const s = bag.slots[cat];
        const sliderPct = state.inputs.sliders[cat] ?? 100;
        html += `
          <div class="chip-row" data-cat="${cat}">
            <div class="name"><div class="club-cell">${clubImgTag(s.name)}<span>${DISPLAY[cat]} — ${escapeHtml(s.name)} ${s.level}</span></div></div>
            <input type="range" min="10" max="100" step="5" value="${sliderPct}" data-cat="${cat}">
            <div class="pct mono">${sliderPct.toFixed(0)}%</div>
            <div class="live mono">0.0</div>
          </div>`;
      }
      wrap.innerHTML = html;
      // Bind once per render — drag updates ONLY the affected row's text,
      // never rebuilds the DOM. Rebuilding mid-drag was destroying the
      // range input's pointer capture and aborting the gesture.
      $$("#chip-rows input[type=range]").forEach(r => {
        r.addEventListener("input", (e) => {
          const cat = e.target.dataset.cat;
          state.inputs.sliders[cat] = +e.target.value;
          saveInputs();
          updateChipLiveValues();
        });
      });
      updateChipLiveValues();
    }

    // Text-only update of every chip row. Safe to call mid-drag.
    function updateChipLiveValues() {
      const bag = activeBag();
      const mph = parseNum(state.inputs.mph);
      const dirF = directionFactor(state.inputs.dir);
      for (const cat of SLIDER) {
        const row = document.querySelector(`#chip-rows .chip-row[data-cat="${cat}"]`);
        if (!row) continue;
        const s = bag.slots[cat];
        const sliderPct = state.inputs.sliders[cat] ?? 100;
        const carry = s.power * sliderPct / 100;
        const rPerMph = ringsPerMph(cat, s.power, s.accuracy, carry, s.name, s.level, bag.ballPower);
        const live = rPerMph * mph * dirF;
        row.querySelector('.pct').textContent = sliderPct.toFixed(0) + '%';
        row.querySelector('.live').textContent = fmt(live);
      }
    }

    function renderBagList() {
      const list = $("#bag-list");
      list.innerHTML = state.bags.map(b => {
        const isActive = b.id === state.activeId;
        const totalPower = ALL_CATS.reduce((s,c) => s + (b.slots[c]?.power || 0), 0);
        const strip = ALL_CATS.map(cat => {
          const n = b.slots[cat]?.name;
          const src = clubImg(n);
          return src
            ? `<img src="${src}" title="${DISPLAY[cat]} — ${escapeHtml(n || '')}" alt="" loading="lazy" onerror="this.outerHTML='&lt;span class=&quot;miss&quot;&gt;&lt;/span&gt;'">`
            : `<span class="miss" title="${DISPLAY[cat]}: (not set)"></span>`;
        }).join("");
        return `
          <div class="bag-card ${isActive ? "active" : ""}">
            <div class="name-line">
              <span>${escapeHtml(b.name)}</span>
              ${isActive ? `<span class="pill on">active</span>` : ""}
            </div>
            <div class="small dim">ball power ${b.ballPower} · total club power ${totalPower}</div>
            <div class="bag-club-strip">${strip}</div>
            <div class="actions">
              <button onclick="GC.setActive('${b.id}')">${isActive ? "✓ active" : "Set active"}</button>
              <button class="primary" onclick="GC.editBag('${b.id}')">Edit</button>
              <button class="danger" onclick="GC.deleteBag('${b.id}')">Delete</button>
            </div>
          </div>`;
      }).join("");
    }

    function renderEdit() {
      const bag = state.bags.find(b => b.id === state.editingId);
      if (!bag) { location.hash = "#bags"; return; }
      $("#edit-title").textContent = "Edit · " + bag.name;
      $("#edit-name").value = bag.name;
      $$("#edit-ball-power .chip").forEach(c => c.classList.toggle("on", +c.dataset.bp === bag.ballPower));
      const slotsWrap = $("#edit-slots");
      slotsWrap.innerHTML = ALL_CATS.map(cat => {
        const s = bag.slots[cat] || {};
        const catClubs = window.CLUBS[cat] || {};
        const known = Object.prototype.hasOwnProperty.call(catClubs, s.name);
        const isCustom = !!(s.name && !known);
        const currentValue = isCustom ? "__custom__" : (s.name || "");
        const triggerLabel = isCustom
          ? "Custom / not in list…"
          : (s.name || "— select club —");
        const cluLevels = (catClubs[s.name]?.power || []).length || 10;
        const levelOpts = Array.from({length: cluLevels}, (_, i) => i + 1)
          .map(l => `<option ${l === s.level ? "selected" : ""}>${l}</option>`).join("");
        const menuItems = [
          `<div class="cs-item${!currentValue ? ' selected' : ''}" data-val=""><span class="cs-icon-empty"></span><span class="cs-placeholder">— select club —</span></div>`,
          ...Object.keys(catClubs).map(n => `
            <div class="cs-item${n === currentValue ? ' selected' : ''}" data-val="${escapeHtml(n)}">
              ${clubImgTag(n, 'cs-icon')}
              <span>${escapeHtml(n)}</span>
            </div>`),
          `<div class="cs-item${currentValue === '__custom__' ? ' selected' : ''}" data-val="__custom__"><span class="cs-icon-empty"></span><span>Custom / not in list…</span></div>`
        ].join("");
        const customRow = isCustom
          ? `<input type="text" class="custom-name" placeholder="custom club name" value="${escapeHtml(s.name)}" data-field="customName">`
          : `<input type="text" class="custom-name" placeholder="custom club name" value="" data-field="customName" style="display:none;">`;
        return `
          <div class="slot" data-cat="${cat}">
            <div class="label">${DISPLAY[cat]}</div>
            <div class="grid">
              <div class="cs" data-field="name" data-value="${escapeHtml(currentValue)}">
                <button type="button" class="cs-trigger">
                  ${isCustom ? `<span class="cs-icon-empty"></span>` : clubImgTag(s.name, 'cs-icon')}
                  <span class="cs-label">${escapeHtml(triggerLabel)}</span>
                  <span class="cs-arrow">▾</span>
                </button>
                <div class="cs-menu" hidden>${menuItems}</div>
              </div>
              <select data-field="level">${levelOpts}</select>
              <input type="number" placeholder="power" value="${s.power ?? ""}" data-field="power" min="0" inputmode="numeric">
              <input type="number" placeholder="acc" value="${s.accuracy ?? ""}" data-field="accuracy" min="0" max="100" inputmode="numeric">
            </div>
            ${customRow}
            <div class="hint">Pick a club → power/acc auto-fill. Edit them after for perk bonuses/penalties.</div>
          </div>`;
      }).join("");
      // wire up auto-fill on name/level change
      $$("#edit-slots .slot").forEach(slot => {
        const cat = slot.dataset.cat;
        const cs      = slot.querySelector('.cs[data-field=name]');
        const lvlI    = slot.querySelector('[data-field=level]');
        const pwrI    = slot.querySelector('[data-field=power]');
        const accI    = slot.querySelector('[data-field=accuracy]');
        const customI = slot.querySelector('[data-field=customName]');

        const getName = () => cs.dataset.value || "";
        const showCustom = () => { customI.style.display = ""; setTimeout(() => customI.focus(), 0); };
        const hideCustom = () => { customI.style.display = "none"; };

        const fillFromCatalog = (forceLevel) => {
          const name = getName();
          const cdata = window.CLUBS[cat]?.[name];
          if (!cdata) return;
          const lvls = cdata.power.length;
          if (lvlI.options.length !== lvls) {
            const cur = Math.min(forceLevel ?? +lvlI.value ?? 1, lvls);
            lvlI.innerHTML = Array.from({length: lvls}, (_, i) => i + 1)
              .map(l => `<option ${l === cur ? "selected" : ""}>${l}</option>`).join("");
          }
          const lvl = +lvlI.value || 1;
          const idx = Math.min(Math.max(lvl - 1, 0), lvls - 1);
          pwrI.value = cdata.power[idx];
          accI.value = cdata.accuracy[idx];
        };

        // Custom dropdown wiring
        const trigger = cs.querySelector('.cs-trigger');
        const menu = cs.querySelector('.cs-menu');
        trigger.addEventListener("click", (e) => {
          e.stopPropagation();
          // Close any other open menu first
          $$(".cs-menu").forEach(m => { if (m !== menu) m.hidden = true; });
          menu.hidden = !menu.hidden;
        });
        menu.addEventListener("click", (e) => {
          const item = e.target.closest(".cs-item");
          if (!item) return;
          e.stopPropagation();
          const val = item.dataset.val;
          cs.dataset.value = val;
          // refresh selected state
          menu.querySelectorAll(".cs-item").forEach(i => i.classList.toggle("selected", i === item));
          // refresh trigger
          const triggerLabel = val === "__custom__"
            ? "Custom / not in list…"
            : (val || "— select club —");
          const triggerIcon = val === "__custom__" || !val
            ? `<span class="cs-icon-empty"></span>`
            : clubImgTag(val, 'cs-icon');
          trigger.innerHTML = `${triggerIcon}<span class="cs-label">${escapeHtml(triggerLabel)}</span><span class="cs-arrow">▾</span>`;
          menu.hidden = true;
          // Apply side effects
          if (val === "__custom__") {
            showCustom();
          } else if (val === "") {
            hideCustom();
            pwrI.value = "";
            accI.value = "";
          } else {
            hideCustom();
            fillFromCatalog(1);
          }
        });

        lvlI.addEventListener("change", () => {
          const name = getName();
          if (name && name !== "__custom__") fillFromCatalog();
        });
      });

      // Outside click closes any open dropdown menu
      if (!window.__csClickWired) {
        document.addEventListener("click", () => {
          $$("#edit-slots .cs-menu").forEach(m => m.hidden = true);
        });
        window.__csClickWired = true;
      }
    }

    // ============================ Mutations ================================
    const GC = window.GC = {
      setActive(id) {
        setActiveId(id);
        renderBagList();
        renderPlay();
      },
      editBag(id) {
        location.hash = "#edit/" + id;
      },
      deleteBag(id) {
        if (state.bags.length <= 1) { alert("Need at least one bag."); return; }
        if (!confirm("Delete this bag?")) return;
        state.bags = state.bags.filter(b => b.id !== id);
        if (state.activeId === id) setActiveId(state.bags[0].id);
        saveBags(state.bags);
        renderBagList();
      },
    };

    function newBag() {
      // Start blank — user picks each club from the dropdown.
      const b = {
        id: uid(),
        name: "Bag " + (state.bags.length + 1),
        ballPower: 0,
        slots: {},
      };
      for (const cat of ALL_CATS) {
        b.slots[cat] = { name: "", level: 1, power: 0, accuracy: 0 };
      }
      state.bags.push(b);
      saveBags(state.bags);
      location.hash = "#edit/" + b.id;
    }

    function saveEdit() {
      const bag = state.bags.find(b => b.id === state.editingId);
      if (!bag) return;
      bag.name = $("#edit-name").value.trim() || "Untitled";
      const bpOn = $("#edit-ball-power .chip.on");
      bag.ballPower = bpOn ? +bpOn.dataset.bp : 0;
      $$("#edit-slots .slot").forEach(slot => {
        const cat = slot.dataset.cat;
        const get = (f) => slot.querySelector(`[data-field=${f}]`)?.value || "";
        // club name lives in the custom dropdown's dataset
        const cs = slot.querySelector('.cs[data-field=name]');
        const selected = cs ? cs.dataset.value : "";
        const name = (selected === "__custom__")
          ? (get("customName").trim() || "Custom")
          : (selected || "Unknown");
        bag.slots[cat] = {
          name,
          level: parseInt(get("level"), 10) || 1,
          power: parseNum(get("power")),
          accuracy: parseNum(get("accuracy")),
        };
      });
      saveBags(state.bags);
      location.hash = "#bags";
    }

    // ============================ Wake Lock ================================
    let wakeLock = null;
    async function requestWakeLock() {
      if (state.view !== "play") return;
      if (!("wakeLock" in navigator)) return;
      try { wakeLock = await navigator.wakeLock.request("screen"); }
      catch { /* permission/feature unavailable */ }
    }
    function releaseWakeLock() { try { wakeLock?.release?.(); wakeLock = null; } catch {} }
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && state.view === "play") requestWakeLock();
    });

    // ============================== Events =================================
    function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

    function onNumpad(k) {
      let v = state.inputs.mph || "0";
      if (k === "bk") {
        v = v.length > 1 ? v.slice(0, -1) : "0";
      } else if (k === ".") {
        if (!v.includes(".")) v = v + ".";
      } else {
        if (v === "0") v = k; else v = v + k;
        if (v.length > 5) v = v.slice(0, 5);
      }
      setMph(v);
    }

    function setMph(v) {
      state.inputs.mph = v;
      saveInputs();
      $("#mph-value").textContent = v;
      renderTable1();
      updateChipLiveValues();
    }

    function onCompassTap(deg) {
      state.inputs.dir = deg;
      saveInputs();
      renderCompass();
      $("#dir-mult").textContent = directionFactor(deg).toFixed(2);
      $("#dir-name").textContent = dirCategory(deg);
      $("#compass-dir").textContent = compassName(deg) + " · " + dirCategory(deg);
      renderTable1();
      updateChipLiveValues();
    }

    function onBallPower(bp) {
      const bag = activeBag();
      bag.ballPower = bp;
      saveBags(state.bags);
      $$("#ball-power .chip").forEach(c => c.classList.toggle("on", +c.dataset.bp === bp));
      renderTable1();
      updateChipLiveValues();
    }

    function onPinYd(v) {
      state.inputs.pinYd = v;
      saveInputs();
      renderTable1();
    }

    function bindEvents() {
      // Numpad — event delegation
      $("#numpad").addEventListener("click", (e) => {
        const b = e.target.closest("button"); if (!b) return;
        onNumpad(b.dataset.k);
      });
      // Clear button on MPH display
      $("#clear-mph").addEventListener("click", () => setMph("0"));
      // Compass
      $("#compass").addEventListener("click", (e) => {
        const g = e.target.closest("[data-deg]");
        if (g) onCompassTap(+g.dataset.deg);
        else if (e.target.closest(".center-btn")) onCompassTap(90); // reset to side wind
      });
      // Ball power
      $("#ball-power").addEventListener("click", (e) => {
        const c = e.target.closest(".chip"); if (!c) return;
        onBallPower(+c.dataset.bp);
      });
      // Pin distance
      $("#pin-yd").addEventListener("input", (e) => onPinYd(e.target.value));
      // Bag selector
      $("#bag-selector").addEventListener("change", (e) => {
        setActiveId(e.target.value);
        renderPlay();
      });
      // Settings → bags
      $("#open-bags").addEventListener("click", () => location.hash = "#bags");
      // Back buttons
      $("#back-from-bags").addEventListener("click", () => location.hash = "#play");
      $("#back-from-edit").addEventListener("click", () => location.hash = "#bags");
      // New bag
      $("#new-bag").addEventListener("click", newBag);
      // Save edit
      $("#save-bag").addEventListener("click", saveEdit);
      // Delete from edit
      $("#delete-bag").addEventListener("click", () => {
        const id = state.editingId;
        if (state.bags.length <= 1) { alert("Need at least one bag."); return; }
        if (!confirm("Delete this bag?")) return;
        state.bags = state.bags.filter(b => b.id !== id);
        if (state.activeId === id) setActiveId(state.bags[0].id);
        saveBags(state.bags);
        location.hash = "#bags";
      });
      // Edit ball power chips
      $("#edit-ball-power").addEventListener("click", (e) => {
        const c = e.target.closest(".chip"); if (!c) return;
        $$("#edit-ball-power .chip").forEach(x => x.classList.toggle("on", x === c));
      });
      // hash routing
      window.addEventListener("hashchange", route);
      // keyboard: number keys, dot, backspace, esc/delete=clear
      window.addEventListener("keydown", (e) => {
        if (state.view !== "play") return;
        if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
        if (/^[0-9]$/.test(e.key)) onNumpad(e.key);
        else if (e.key === ".") onNumpad(".");
        else if (e.key === "Backspace") onNumpad("bk");
        else if (e.key === "Escape" || e.key === "Delete") setMph("0");
      });
    }

    // ============================== PWA =====================================
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    // ============================== Boot ====================================
    bindEvents();
    route();

  })();
  </script>
</body>
</html>
